spring.application.name=server

# Database configuration properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Database credentials
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/free_school_db}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASS:admin123}

server.error.include-message=always

app.cookie.secure=${COOKIE_SECURE:false}
app.frontend.origins=${FRONTEND_ORIGINS:https://cron-job.org,http://localhost:5173}

# 15 minutes for jwt
jwt.expiration= 900000
# 30 minutes for refresh jwt
jwt.refresh-expiration = 1800000
jwt.secret-key=${JWT_SECRET:e22daa655ec6a696c789c6e1e850631df22d09af38aa9b9431fd3af6cc4c96d2}

# Document storage properties
document.upload-directory=doc-uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
